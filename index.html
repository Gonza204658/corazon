<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Para ti ❤️</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<!-- Corazones flotando -->
<div class="hearts"></div>

<div class="contenedor">
    <div class="love" id="love"></div>

    <h1 class="mensaje">
        <span id="texto"></span>
    </h1>
</div>

<script>
const love = document.getElementById("love");

// ❤️ Forma del corazón
const heartShape = [
"000011001100000",
"000111111111000",
"001111111111100",
"011111111111110",
"011111111111110",
"011111111111110",
"001111111111100",
"000111111111000",
"000011111110000",
"000001111100000",
"000000111000000",
"000000010000000"
];

// Crear bloques del corazón
heartShape.forEach((fila, y) => {
    fila.split("").forEach((col, x) => {
        if(col === "1"){
            let bloque = document.createElement("div");
            bloque.classList.add("block");

            bloque.style.left = (x * 32) + "px";
            bloque.style.top = (y * 32) + "px";

            love.appendChild(bloque);
        }
    });
});

// ✍️ EFECTO ESCRITURA
const mensaje = `Te amo como la sal pega con el mango, cuando te veo me vuelvo como tú cuando te llegaron los tacones, algo que no tenías imprevisto y te llenaste de alegría, así es mi sentimiento contigo.

Te pido una disculpa con estos dulces que te gustan (sé que te encanta el de mango pero no lo logré conseguir), espero te gusten amor, algo diferente pero con amor.

Te amo sin importar nada ❤️`;

let i = 0;
const velocidad = 35;
const textoElemento = document.getElementById("texto");

function escribir(){
    if(i < mensaje.length){
        textoElemento.innerHTML += mensaje.charAt(i);
        i++;
        setTimeout(escribir, velocidad);
    }
}

escribir();

// 💕 CORAZONES FLOTANDO
const heartsContainer = document.querySelector(".hearts");

setInterval(() => {
    let heart = document.createElement("div");
    heart.classList.add("float-heart");

    heart.style.left = Math.random() * 100 + "vw";
    heart.style.animationDuration = (3 + Math.random() * 2) + "s";

    heartsContainer.appendChild(heart);

    setTimeout(() => heart.remove(), 5000);
}, 300);
</script>

</body>
</html>
